<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#1e0a3c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Radial purple glow -->
  <ellipse cx="600" cy="280" rx="520" ry="320" fill="url(#bgGlow)"/>

  <!-- Plane emoji rendered as text -->
  <text x="600" y="210" font-size="96" text-anchor="middle" dominant-baseline="middle">✈️</text>

  <!-- Roamie title -->
  <text
    x="600"
    y="310"
    font-family="Georgia, serif"
    font-size="80"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1"
  >Roamie</text>

  <!-- Tagline -->
  <text
    x="600"
    y="393"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="32"
    font-weight="400"
    fill="#F472B6"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0.5"
  >Your love, across miles</text>

  <!-- URL -->
  <text
    x="600"
    y="530"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#6b7280"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1"
  >roamietravel.app</text>
</svg>
